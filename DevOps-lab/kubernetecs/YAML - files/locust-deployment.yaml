apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
  template:
    metadata:
      labels:
        app: locust
    spec:
      containers:
      - name: locust
        image: locustio/locust
        ports:
        - containerPort: 8089
        volumeMounts:
        - name: locustfile
          mountPath: /locust
        args: ["-f", "/locust/locustfile.py"]
      volumes:
      - name: locustfile
        configMap:
          name: locustfile

